<!DOCTYPE html>
<html>
<head>
  <title>Shop API</title>
</head>
<body>
  <h1>Shop API</h1>
  <p>A simple shop backend. Endpoints:</p>
  <ul>
    <li>POST /users - create a user</li>
    <li>GET /users/:id - get a user</li>
    <li>POST /orders - create an order</li>
    <li>GET /orders/:id/total - get order total</li>
    <li>GET /search?q= - search products</li>
  </ul>
  <p>Status: running</p>
</body>
</html>
